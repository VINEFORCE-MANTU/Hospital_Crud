<div class="chatbot-container">

    <!-- Floating Bot Button -->

    <button
        *ngIf="!showChat"
        class="chat-toggle"
        (click)="openChat($event)">

        <i class="fas fa-robot"></i>

    </button>

    <!-- Chat Window -->

    <div
        #chatWindow
        *ngIf="showChat"
        class="chat-window">

        <!-- Header -->

        <div class="chat-header">

            <div class="chat-title">

                <div class="avatar">
                    <i class="fas fa-user-md"></i>
                </div>

                <div>

                    <div class="title">
                        Doctor AI Assistant
                    </div>

                    <small class="status">
                        Online
                    </small>

                </div>

            </div>

            <button
                class="close-btn"
                (click)="toggleChat()">

                <i class="fas fa-times"></i>

            </button>

        </div>

        <!-- Chat Body -->

        <div class="chat-body">

            <div
                *ngIf="!response"
                class="welcome-message">

                👋 Hello Doctor

                <br><br>

                Ask any medical question, discuss symptoms,
                treatment approaches, medications,
                differential diagnoses or clinical guidelines.

            </div>

            <div
                *ngIf="response"
                class="ai-message">

                <div class="message-header">

                    <i class="fas fa-robot"></i>

                    <span>Doctor AI</span>

                </div>

                <div class="message-content">

                    {{ response }}

                </div>

            </div>

        </div>

        <!-- Footer -->

        <div class="chat-footer">

            <textarea
                rows="3"
                [(ngModel)]="question"
                class="form-control"
                placeholder="Type your medical question here..."
                (keydown.enter)="askAi(); $event.preventDefault()">
            </textarea>

            <div class="footer-actions">

                <button
                    class="btn-clear"
                    (click)="clearChat()">

                    Clear

                </button>

                <button
                    class="btn-send"
                    (click)="askAi()"
                    [disabled]="loading">

                    <span *ngIf="!loading">
                        Send
                    </span>

                    <span *ngIf="loading">
                        Thinking...
                    </span>

                </button>

            </div>

        </div>

    </div>

</div>
